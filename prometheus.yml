# Prometheus configuration for scraping metrics from the observable AI chatbot

global:
  scrape_interval: 5s  # How frequently to scrape targets
  evaluation_interval: 5s  # How frequently to evaluate rules

scrape_configs:
  - job_name: 'chatbot'
    static_configs:
      - targets: ['chatbot:8000']  # Docker service name, not localhost
    metrics_path: '/metrics'  # Endpoint where metrics are exposed
    scrape_interval: 5s  # Override global interval for this job
